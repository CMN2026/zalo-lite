services:
  postgres:
    image: postgres:16-alpine
    container_name: zalo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: zalo_user
      POSTGRES_USER: zalo
      POSTGRES_PASSWORD: zalo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../backend/services/user-service/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zalo -d zalo_user"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: zalo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: zalo-dynamodb-local
    restart: unless-stopped
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"
    ports:
      - "8000:8000"

volumes:
  postgres_data:
  redis_data:
